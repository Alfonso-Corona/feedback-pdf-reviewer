name: Deploy frontend to S3 + CloudFront

on:
  push:
    branches: [ main ]

env: 
  CLOUDFRONT_DIS_ID: ${{ secrets.CLOUDFRONT_DIS_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credential@v2
      with:
        aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
        aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
        aws-region: ${{secrets.AWS_REGION}}

    - name: Upload to S3
      run: aws s3 sync ./frontend s3://${{secrets.S3_BUCKET}} --delete

    - name: Invalidate Cloudfront service
      if: ${{ env.CLOUDFRONT_DIS_ID != ''}}
      run: aws cloudfront create-invalidation --distribution-id ${{env.CLOUDFRONT_DIS_ID}} --paths "/*"
